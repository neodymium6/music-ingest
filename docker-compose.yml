services:
  app:
    build: .
    container_name: music-ingest
    ports:
      - "8080:8080"
    environment:
      MUSIC_INGEST_CONF_DIR: /app/conf
      BEETSDIR: /app/beets
    volumes:
      - ./conf:/app/conf:ro
      - ./beets:/app/beets:ro
      - ./data:/app/data
      - ${MUSIC_INCOMING_DIR:?set MUSIC_INCOMING_DIR}:/music/incoming
      - ${MUSIC_LIBRARY_DIR:?set MUSIC_LIBRARY_DIR}:/music/library
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
